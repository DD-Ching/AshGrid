# AshGrid CI gate (Phase 146) — the same checks as the local pre-commit hook
# (tools/githooks/pre-commit), but enforced server-side so they can't be
# bypassed with --no-verify or skipped on a machine without the hook installed.
#
#   1. node --check every client JS file        (syntax errors)
#   2. node tools/version.js check              (missing/untracked file, ?v= drift)
#   3. node tools/check_sim_parity.js           (client↔server weapon / obs drift)
#   4. node tools/test_reconcile.js             (MP self-reconcile pipeline contract)
#   5. node tools/test_director.js              (adaptive-director one-way DDA invariant)
#   6. node tools/test_killcam.js               (death replay buffer + press-SPACE respawn)
#   7. node tools/test_mp_respawn.js            (MP server respawn-authority rule)
#   8. node tools/test_mp_ad_revive.js          (MP ad-revive is server-authoritative, no local revive)
#   9. node tools/test_mp_chassis.js            (MP server chassis-damage routing: armour + dash + bleed)
#  10. node tools/test_squad_slots.js           (squad roster: SOLO + MP my-recruits-only filter + cap)
#
# No npm install needed: the parity test's server imports are local-only
# (./constants.js), and the tools have zero dependencies (the reconcile test
# loads js/mp_reconcile.js in a vm with stubbed globals — no network/PartyKit).
name: checks

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check client JS
        run: find js -name '*.js' -print0 | xargs -0 -n1 -P4 node --check

      - name: Inline-script syntax (index.html)
        run: node tools/check_inline.js

      - name: Asset version + integrity
        run: node tools/version.js check

      - name: SOLO/MP sim parity
        run: node tools/check_sim_parity.js

      - name: MP reconcile pipeline smoke test
        run: node tools/test_reconcile.js

      - name: Adaptive director (one-way DDA) smoke test
        run: node tools/test_director.js

      - name: Killcam (death replay + respawn) smoke test
        run: node tools/test_killcam.js

      - name: MP respawn-authority smoke test
        run: node tools/test_mp_respawn.js

      - name: MP ad-revive authority smoke test
        run: node tools/test_mp_ad_revive.js

      - name: NPC director (anti-clump / goals / fail-safe) smoke test
        run: node tools/test_npc_director.js

      - name: MP chassis-damage parity smoke test
        run: node tools/test_mp_chassis.js

      - name: Squad-slot roster smoke test
        run: node tools/test_squad_slots.js
