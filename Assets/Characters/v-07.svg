<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360">
  <rect width="240" height="360" fill="#E8E4D8"/>
  <!-- constructivist red wedges -->
  <polygon points="0,360 0,250 100,360" fill="#C8261C" opacity="0.18"/>
  <polygon points="240,0 180,0 240,55" fill="#C8261C" opacity="0.14"/>
  <!-- head: hex visor -->
  <polygon points="120,28 145,40 145,82 120,94 95,82 95,40" fill="#1A1A1A"/>
  <line x1="103" y1="62" x2="137" y2="62" stroke="#C8261C" stroke-width="4"/>
  <!-- neck -->
  <rect x="113" y="94" width="14" height="14" fill="#1A1A1A"/>
  <!-- torso (asymmetric shoulders) -->
  <path d="M 80 108 L 165 108 L 168 220 L 78 220 Z" fill="#1A1A1A"/>
  <!-- red audit emblem -->
  <rect x="98" y="138" width="46" height="56" fill="#C8261C"/>
  <text x="121" y="158" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#E8E4D8" text-anchor="middle">V-07</text>
  <text x="121" y="172" font-family="Courier New, monospace" font-size="7" fill="#E8E4D8" text-anchor="middle">AUDITOR</text>
  <text x="121" y="184" font-family="Courier New, monospace" font-size="7" fill="#E8E4D8" text-anchor="middle">CYC 347</text>
  <!-- arms -->
  <rect x="55" y="112" width="22" height="98" fill="#1A1A1A"/>
  <rect x="167" y="112" width="22" height="92" fill="#1A1A1A"/>
  <rect x="55" y="210" width="22" height="40" fill="#1A1A1A"/>
  <rect x="167" y="204" width="22" height="50" fill="#1A1A1A"/>
  <!-- hip -->
  <rect x="80" y="220" width="86" height="22" fill="#1A1A1A"/>
  <!-- legs -->
  <rect x="88" y="242" width="26" height="100" fill="#1A1A1A"/>
  <rect x="132" y="242" width="26" height="100" fill="#1A1A1A"/>
  <!-- feet -->
  <rect x="80" y="342" width="42" height="14" fill="#1A1A1A"/>
  <rect x="124" y="342" width="42" height="14" fill="#1A1A1A"/>
  <!-- HUD readouts -->
  <text x="14" y="20" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#1A1A1A">SEED 87%</text>
  <text x="14" y="32" font-family="Courier New, monospace" font-size="8" fill="#6B6B6B">CYCLE #347</text>
  <text x="226" y="20" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#C8261C" text-anchor="end">V-07</text>
  <text x="226" y="32" font-family="Courier New, monospace" font-size="8" fill="#6B6B6B" text-anchor="end">OBJECTIVE AUDITOR</text>
</svg>
