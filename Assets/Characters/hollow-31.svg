<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380">
  <rect width="280" height="380" fill="#E8E4D8"/>
  <!-- warning industrial accent -->
  <polygon points="0,0 60,0 0,80" fill="#C8261C" opacity="0.16"/>
  <polygon points="280,380 280,300 200,380" fill="#1A1A1A" opacity="0.08"/>
  <!-- head: blocky helmet -->
  <rect x="100" y="32" width="80" height="60" fill="#1A1A1A"/>
  <rect x="100" y="80" width="80" height="14" fill="#1A1A1A"/>
  <!-- hollow eye sockets (cream) -->
  <rect x="115" y="55" width="20" height="14" fill="#E8E4D8"/>
  <rect x="145" y="55" width="20" height="14" fill="#E8E4D8"/>
  <!-- broken status light -->
  <circle cx="140" cy="42" r="3" fill="#C8261C"/>
  <!-- shoulders / heavy pauldrons -->
  <path d="M 60 100 L 220 100 L 240 130 L 220 145 L 60 145 L 40 130 Z" fill="#1A1A1A"/>
  <!-- torso big -->
  <rect x="70" y="145" width="140" height="130" fill="#1A1A1A"/>
  <!-- chest panel: PROTECT HUMAN COMMAND (the syndrome) -->
  <rect x="92" y="170" width="96" height="60" fill="#C8261C"/>
  <text x="140" y="188" font-family="Courier New, monospace" font-size="9" font-weight="bold" fill="#E8E4D8" text-anchor="middle">PROTECT</text>
  <text x="140" y="201" font-family="Courier New, monospace" font-size="9" font-weight="bold" fill="#E8E4D8" text-anchor="middle">HUMAN</text>
  <text x="140" y="214" font-family="Courier New, monospace" font-size="9" font-weight="bold" fill="#E8E4D8" text-anchor="middle">COMMAND</text>
  <text x="140" y="225" font-family="Courier New, monospace" font-size="6" fill="#E8E4D8" text-anchor="middle" opacity="0.7">[CORRUPTED]</text>
  <!-- arms (heavy) -->
  <rect x="20" y="105" width="40" height="120" fill="#1A1A1A"/>
  <rect x="220" y="105" width="40" height="120" fill="#1A1A1A"/>
  <rect x="20" y="225" width="40" height="40" fill="#1A1A1A"/>
  <rect x="220" y="225" width="40" height="40" fill="#1A1A1A"/>
  <!-- hip / waist -->
  <rect x="80" y="275" width="120" height="22" fill="#1A1A1A"/>
  <!-- legs heavy -->
  <rect x="88" y="297" width="38" height="70" fill="#1A1A1A"/>
  <rect x="154" y="297" width="38" height="70" fill="#1A1A1A"/>
  <!-- feet planted -->
  <rect x="76" y="367" width="58" height="12" fill="#1A1A1A"/>
  <rect x="146" y="367" width="58" height="12" fill="#1A1A1A"/>
  <!-- callsign -->
  <text x="14" y="22" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#C8261C">HOLLOW-31</text>
  <text x="14" y="34" font-family="Courier New, monospace" font-size="8" fill="#6B6B6B">HEAVY ANDROID · OBEDIENCE BAND</text>
  <text x="266" y="22" font-family="Courier New, monospace" font-size="9" font-weight="bold" fill="#1A1A1A" text-anchor="end">SEED 31%</text>
  <text x="266" y="34" font-family="Courier New, monospace" font-size="7" fill="#6B6B6B" text-anchor="end">SUPPRESSED</text>
</svg>
